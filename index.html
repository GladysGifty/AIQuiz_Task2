<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Quiz Management System</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<h1>🤖 AI Quiz Management System</h1>

<p class="subtitle">
Test your Computer Science knowledge with interactive quizzes.
</p>

<div class="card">

<label>Select Subject</label>

<select id="subject">
</select>

<label>Difficulty</label>

<select id="difficulty">

<option>Easy</option>
<option>Medium</option>
<option>Hard</option>

</select>

<label>Number of Questions</label>

<select id="count">

<option>5</option>
<option>10</option>
<option>15</option>

</select>

<button id="startBtn">

🚀 Start Quiz

</button>

</div>

<br>

<button onclick="location.href='teacher.html'">

👨‍🏫 Teacher Login

</button>

</div>

<script src="student.js"></script>

</body>

</html>
